# Render.com - Déploiement gratuit PeleAI 360°
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: peleai360
    runtime: node

    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
